<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Revestimento Antirreflexo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #4cc9f0;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #8a99ad;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            background-color: #161c2a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #232d42;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            background-color: #070a12;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 380px;
            background: #0d121f;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 13px;
            font-weight: bold;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }

        label span {
            color: #4cc9f0;
            font-family: monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #2e394e;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            background: #3f37c9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4895ef;
        }

        .stats-box {
            background: #070a12;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #f72585;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            margin-top: 10px;
        }

        .stats-box div {
            display: flex;
            justify-content: space-between;
        }

        .stats-box .highlight {
            color: #ffb703;
            font-weight: bold;
            font-size: 16px;
        }

        .wave-title {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: -10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>Revestimento Antirreflexo (Cancelamento de Ondas)</h2>
    <p class="subtitle">Ajuste a espessura e o índice para forçar a interferência destrutiva e apagar o reflexo.</p>

    <div class="container">

        <div class="panel">
            <canvas id="rayCanvas" width="500" height="250"></canvas>
            <div class="wave-title">Análise de Fase (r1 + r2)</div>
            <canvas id="waveCanvas" width="500" height="120"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Comprimento de Onda Alvo (&lambda;) <span id="wl-val">550 nm</span></label>
                <input type="range" id="wl" min="400" max="700" value="550">
            </div>

            <div class="control-group">
                <label>Espessura do Revestimento (t) <span id="t-val">100 nm</span></label>
                <input type="range" id="thick" min="50" max="300" value="100">
            </div>

            <div class="control-group">
                <label>Índice do Revestimento (n_l) <span id="nl-val">1.30</span></label>
                <input type="range" id="nl" min="1.10" max="2.00" value="1.30" step="0.01">
            </div>

            <div class="control-group">
                <label>Índice do Substrato (Vidro) (n_s) <span id="ns-val">1.50</span></label>
                <input type="range" id="ns" min="1.40" max="2.50" value="1.50" step="0.01">
            </div>

            <div class="btn-group">
                <button id="btnIdealIndex" title="Faz n_l = sqrt(n_0 * n_s)">Aplicar Índice Mágico</button>
                <button id="btnIdealThick" title="Faz t = lambda / (4 * n_l)">Aplicar Espessura 1/4 de Onda</button>
            </div>

            <div class="stats-box" id="statsBox">
                <div><span>Luz Refletida (Intensidade):</span> <span id="out-ref" class="highlight">0%</span></div>
                <hr style="width: 100%; border: 0.5px solid #1e293b; margin: 5px 0;">
                <div style="font-size: 12px; color: #94a3b8;"><span>Condição n² = n₀nₛ ?</span> <span
                        id="out-cond-index">Não</span></div>
                <div style="font-size: 12px; color: #94a3b8;"><span>Condição t = &lambda;/(4n) ?</span> <span
                        id="out-cond-thick">Não</span></div>
            </div>
        </div>
    </div>

    <script>
        const rayCtx = document.getElementById('rayCanvas').getContext('2d');
        const waveCtx = document.getElementById('waveCanvas').getContext('2d');

        const wlSlider = document.getElementById('wl');
        const tSlider = document.getElementById('thick');
        const nlSlider = document.getElementById('nl');
        const nsSlider = document.getElementById('ns');

        // Valores de Ar fixo (n0 = 1)
        const n0 = 1.0;

        function nmToRGB(wl) {
            let r = 0, g = 0, b = 0;
            if (wl >= 380 && wl < 440) { r = -(wl - 440) / (440 - 380); b = 1; }
            else if (wl >= 440 && wl < 490) { g = (wl - 440) / (490 - 440); b = 1; }
            else if (wl >= 490 && wl < 510) { g = 1; b = -(wl - 510) / (510 - 490); }
            else if (wl >= 510 && wl < 580) { r = (wl - 510) / (580 - 510); g = 1; }
            else if (wl >= 580 && wl < 645) { r = 1; g = -(wl - 645) / (645 - 580); }
            else if (wl >= 645 && wl <= 780) { r = 1; }
            return `rgb(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)})`;
        }

        function calculatePhysics() {
            let wl = parseFloat(wlSlider.value);
            let t = parseFloat(tSlider.value);
            let nl = parseFloat(nlSlider.value);
            let ns = parseFloat(nsSlider.value);

            // Coeficientes de Reflexão de Amplitude (Fórmula de Fresnel)
            let r01 = (n0 - nl) / (n0 + nl);
            let r12 = (nl - ns) / (nl + ns);

            // Diferença de fase devido ao caminho percorrido dentro do revestimento
            let delta = (4 * Math.PI / wl) * nl * t;

            // Intensidade Total Refletida R (0 a 1)
            let R_num = Math.pow(r01, 2) + Math.pow(r12, 2) + 2 * r01 * r12 * Math.cos(delta);
            let R_den = 1 + Math.pow(r01 * r12, 2) + 2 * r01 * r12 * Math.cos(delta);
            let R = R_num / R_den;
            if (R < 0.0001) R = 0; // Corrige float minúsculo

            // Valores ideais para o botão
            let ideal_nl = Math.sqrt(n0 * ns);
            let ideal_t = wl / (4 * nl);

            return { wl, t, nl, ns, r01, r12, delta, R, ideal_nl, ideal_t };
        }

        function drawDiagram(physics) {
            let w = rayCtx.canvas.width;
            let h = rayCtx.canvas.height;
            rayCtx.clearRect(0, 0, w, h);

            let color = nmToRGB(physics.wl);
            let coatingTop = 100;
            // Mapeia espessura de 50-300 para pixels visuais proporcionais
            let coatingBottom = coatingTop + (physics.t * 0.3);

            // Ar
            rayCtx.fillStyle = '#0b0f19'; rayCtx.fillRect(0, 0, w, coatingTop);
            rayCtx.fillStyle = '#cbd5e1'; rayCtx.font = '12px sans-serif'; rayCtx.fillText("AR (n₀ = 1.0)", 10, 20);

            // Revestimento
            rayCtx.fillStyle = 'rgba(76, 201, 240, 0.15)'; rayCtx.fillRect(0, coatingTop, w, coatingBottom - coatingTop);
            rayCtx.strokeStyle = '#4cc9f0'; rayCtx.beginPath(); rayCtx.moveTo(0, coatingTop); rayCtx.lineTo(w, coatingTop); rayCtx.stroke();
            rayCtx.beginPath(); rayCtx.moveTo(0, coatingBottom); rayCtx.lineTo(w, coatingBottom); rayCtx.stroke();
            rayCtx.fillStyle = '#4cc9f0'; rayCtx.fillText(`COATING (n_l = ${physics.nl.toFixed(2)})`, 10, coatingTop + 18);

            // Substrato
            rayCtx.fillStyle = '#1e293b'; rayCtx.fillRect(0, coatingBottom, w, h - coatingBottom);
            rayCtx.fillStyle = '#94a3b8'; rayCtx.fillText(`VIDRO (n_s = ${physics.ns.toFixed(2)})`, 10, coatingBottom + 18);

            // Desenho dos Raios
            rayCtx.lineWidth = 2;
            let incX = 60, incY = 20;
            let p1X = 220, p1Y = coatingTop;
            let p2X = 260, p2Y = coatingBottom;
            let outX = 380, outY = 20;

            // Luz Incidente
            rayCtx.strokeStyle = color;
            rayCtx.beginPath(); rayCtx.moveTo(incX, incY); rayCtx.lineTo(p1X, p1Y); rayCtx.stroke();

            // Refração dentro do coating
            rayCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            rayCtx.beginPath(); rayCtx.moveTo(p1X, p1Y); rayCtx.lineTo(p2X, p2Y); rayCtx.stroke();
            rayCtx.beginPath(); rayCtx.moveTo(p2X, p2Y); rayCtx.lineTo(p1X + 80, p1Y); rayCtx.stroke(); // volta

            // Raio de Reflexão (A intensidade visual depende de R)
            rayCtx.strokeStyle = color;
            rayCtx.globalAlpha = Math.max(0.05, physics.R); // Escurece se R tender a zero
            rayCtx.lineWidth = 1 + (physics.R * 4); // Fica mais fino se cancelar
            rayCtx.beginPath(); rayCtx.moveTo(p1X, p1Y); rayCtx.lineTo(outX, outY); rayCtx.stroke();
            rayCtx.beginPath(); rayCtx.moveTo(p1X + 80, p1Y); rayCtx.lineTo(outX + 40, outY); rayCtx.stroke();
            rayCtx.globalAlpha = 1.0;

            // Transmissão principal para o vidro
            rayCtx.lineWidth = 3 - (physics.R * 2);
            rayCtx.strokeStyle = color;
            rayCtx.beginPath(); rayCtx.moveTo(p2X, p2Y); rayCtx.lineTo(p2X + 40, h); rayCtx.stroke();
        }

        function drawWaves(physics) {
            let w = waveCtx.canvas.width;
            let h = waveCtx.canvas.height;
            waveCtx.clearRect(0, 0, w, h);

            // Grade e Eixo
            waveCtx.strokeStyle = '#1e293b'; waveCtx.beginPath(); waveCtx.moveTo(0, h / 2); waveCtx.lineTo(w, h / 2); waveCtx.stroke();

            let color = nmToRGB(physics.wl);

            // As amplitudes originais (assumindo n0 < nl < ns, então r01 e r12 são ambos negativos -> fase de pi)
            let amp1 = Math.abs(physics.r01) * 200; // Escala para caber na tela
            let amp2 = Math.abs(physics.r12) * 200;

            waveCtx.lineWidth = 2;
            waveCtx.beginPath();
            let first1 = true, first2 = true, firstSum = true;

            let path1 = new Path2D();
            let path2 = new Path2D();
            let pathSum = new Path2D();

            for (let x = 0; x < w; x++) {
                let kx = x * 0.05; // Frequencia espacial

                // Ambas as ondas refletidas sofrem inversão de fase (pi) pq vão do menos pro mais denso.
                // A onda 2 ganha a fase adicional 'delta' do caminho percorrido no filme.
                let y1 = amp1 * Math.cos(kx + Math.PI);
                let y2 = amp2 * Math.cos(kx + Math.PI + physics.delta);
                let ySum = y1 + y2;

                if (first1) { path1.moveTo(x, h / 2 + y1); first1 = false; } else { path1.lineTo(x, h / 2 + y1); }
                if (first2) { path2.moveTo(x, h / 2 + y2); first2 = false; } else { path2.lineTo(x, h / 2 + y2); }
                if (firstSum) { pathSum.moveTo(x, h / 2 + ySum); firstSum = false; } else { pathSum.lineTo(x, h / 2 + ySum); }
            }

            // Onda 1 (Topo) - Linha tracejada
            waveCtx.strokeStyle = '#4cc9f0'; waveCtx.setLineDash([4, 4]); waveCtx.stroke(path1);

            // Onda 2 (Fundo) - Linha tracejada
            waveCtx.strokeStyle = '#ffb703'; waveCtx.stroke(path2);

            // Onda Soma (Real Refletida) - Linha Sólida Espessa
            waveCtx.setLineDash([]);
            waveCtx.strokeStyle = color;
            waveCtx.lineWidth = 3;
            waveCtx.stroke(pathSum);

            // Textos
            waveCtx.fillStyle = '#4cc9f0'; waveCtx.font = '10px sans-serif'; waveCtx.fillText("r1 (topo)", 10, 15);
            waveCtx.fillStyle = '#ffb703'; waveCtx.fillText("r2 (fundo)", 60, 15);
            waveCtx.fillStyle = color; waveCtx.fillText("Soma (Reflexo Real)", 120, 15);
        }

        function updateUI() {
            let phys = calculatePhysics();

            document.getElementById('wl-val').innerText = phys.wl + " nm";
            document.getElementById('t-val').innerText = phys.t + " nm";
            document.getElementById('nl-val').innerText = phys.nl.toFixed(2);
            document.getElementById('ns-val').innerText = phys.ns.toFixed(2);

            let percentRef = (phys.R * 100);
            let refStr = percentRef < 0.01 ? "0.00%" : percentRef.toFixed(2) + "%";
            document.getElementById('out-ref').innerText = refStr;

            // Lógica de cores da caixa de status
            let sBox = document.getElementById('statsBox');
            if (percentRef < 0.1) {
                sBox.style.borderLeftColor = '#06d6a0'; // Verde (Sucesso)
                document.getElementById('out-ref').style.color = '#06d6a0';
            } else {
                sBox.style.borderLeftColor = '#f72585'; // Vermelho
                document.getElementById('out-ref').style.color = '#ffb703';
            }

            // Verifica as "Key Points"
            let isIndexPerfect = Math.abs(phys.nl - phys.ideal_nl) < 0.02;
            let isThickPerfect = Math.abs(phys.t - phys.ideal_t) < 2;

            document.getElementById('out-cond-index').innerText = isIndexPerfect ? "Sim ✅" : "Não ❌";
            document.getElementById('out-cond-thick').innerText = isThickPerfect ? "Sim ✅" : "Não ❌";
            document.getElementById('out-cond-index').style.color = isIndexPerfect ? "#06d6a0" : "#94a3b8";
            document.getElementById('out-cond-thick').style.color = isThickPerfect ? "#06d6a0" : "#94a3b8";

            drawDiagram(phys);
            drawWaves(phys);
        }

        // Botoes Magicos
        document.getElementById('btnIdealIndex').addEventListener('click', () => {
            let ns = parseFloat(nsSlider.value);
            nlSlider.value = Math.sqrt(n0 * ns).toFixed(2);
            updateUI();
        });

        document.getElementById('btnIdealThick').addEventListener('click', () => {
            let wl = parseFloat(wlSlider.value);
            let nl = parseFloat(nlSlider.value);
            tSlider.value = Math.round(wl / (4 * nl));
            updateUI();
        });

        wlSlider.addEventListener('input', updateUI);
        tSlider.addEventListener('input', updateUI);
        nlSlider.addEventListener('input', updateUI);
        nsSlider.addEventListener('input', updateUI);

        updateUI();
    </script>
</body>

</html>
