<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avançado: Lei de Malus</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            max-width: 950px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .formula {
            text-align: center;
            font-size: 1.1rem;
            color: #6c757d;
            font-style: italic;
            margin-bottom: 25px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Painel de Controle e Visualização */
        .control-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 12px;
        }

        .visualizer {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e1e24;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
        }

        .label-vis {
            color: #868e96;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Representação do Analisador e do Feixe */
        .setup-display {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .analyzer-disc {
            width: 70px;
            height: 70px;
            border: 3px solid #dee2e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .analyzer-axis {
            width: 2px;
            height: 100%;
            background-color: #e03131;
            transition: transform 0.1s ease;
        }

        .light-detector {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fcc419;
            box-shadow: 0 0 30px #fcc419;
            transition: all 0.1s ease;
        }

        /* Sliders e Outputs */
        .slider-section {
            margin-top: 10px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .range-input {
            width: 100%;
            height: 6px;
            background: #dee2e6;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #228be6;
            cursor: pointer;
        }

        .metrics {
            margin-top: 20px;
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #228be6;
        }

        /* Área do Gráfico */
        .chart-panel {
            background: #ffffff;
            padding: 10px;
            display: flex;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <h1>Simulador Interativo: Lei de Malus</h1>
        <div class="formula">I(θ) = I(0) · cos²(θ)</div>

        <div class="main-grid">
            <div class="control-panel">
                <div class="visualizer">
                    <div class="label-vis">Demonstração Visual (Filtro e Intensidade)</div>
                    <div class="setup-display">
                        <div class="analyzer-disc" title="Eixo de transmissão do Analisador">
                            <div class="analyzer-axis" id="analyzerAxis"></div>
                        </div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                        <div class="light-detector" id="lightDetector"></div>
                    </div>
                </div>

                <div class="slider-section">
                    <div class="slider-label">
                        <span>Ângulo do Analisador (θ):</span>
                        <span style="color: #228be6;">
                            <id id="angleText">0</id>°
                        </span>
                    </div>
                    <input type="range" id="angleSlider" class="range-input" min="0" max="360" value="0">
                </div>

                <div class="metrics">
                    <div><strong>Intensidade Inicial I(0):</strong> 100%</div>
                    <div style="margin-top: 5px;"><strong>Intensidade Transmitida I(θ):</strong> <span
                            id="intensityText" style="color: #e03131; font-weight: bold;">100.0</span>%</div>
                </div>
            </div>

            <div class="chart-panel">
                <canvas id="malusChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('angleSlider');
        const angleText = document.getElementById('angleText');
        const intensityText = document.getElementById('intensityText');
        const analyzerAxis = document.getElementById('analyzerAxis');
        const lightDetector = document.getElementById('lightDetector');

        // 1. Geração prévia dos dados de referência da curva teórica (0 a 360 graus)
        const curveData = [];
        for (let a = 0; a <= 360; a += 2) {
            const rad = a * (Math.PI / 180);
            const y = Math.pow(Math.cos(rad), 2) * 100;
            curveData.push({ x: a, y: y });
        }

        // 2. Inicialização do Gráfico utilizando Chart.js
        const ctx = document.getElementById('malusChart').getContext('2d');
        const malusChart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'Curva Teórica I(θ)',
                        data: curveData,
                        borderColor: '#228be6',
                        borderWidth: 2.5,
                        pointRadius: 0, // Oculta pontos individuais para suavizar a linha
                        fill: false,
                        tension: 0.1
                    },
                    {
                        label: 'Ponto Atual',
                        data: [{ x: 0, y: 100 }], // Ponto vermelho móvel
                        backgroundColor: '#e03131',
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        showLine: false // Mantém apenas o marcador isolado
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        min: 0,
                        max: 360,
                        title: {
                            display: true,
                            text: 'Ângulo θ (Graus)',
                            font: { weight: 'bold' }
                        },
                        ticks: {
                            stepSize: 45
                        }
                    },
                    y: {
                        min: 0,
                        max: 110, // Margem superior pequena para melhor visualização do pico
                        title: {
                            display: true,
                            text: 'Intensidade Relativa (%)',
                            font: { weight: 'bold' }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top'
                    }
                }
            }
        });

        // 3. Função de atualização em tempo real baseada na entrada do usuário
        function updateSimulation() {
            const thetaDeg = parseInt(slider.value);
            const thetaRad = thetaDeg * (Math.PI / 180);

            // Cálculo matemático da Lei de Malus
            const currentIntensity = Math.pow(Math.cos(thetaRad), 2) * 100;

            // Atualização do texto numérico
            angleText.textContent = thetaDeg;
            intensityText.textContent = currentIntensity.toFixed(1);

            // Atualização mecânica: Rotaciona a linha do eixo do analisador visual
            analyzerAxis.style.transform = `rotate(${thetaDeg}deg)`;

            // Atualização óptica: Modifica opacidade e o brilho do detector de luz
            const opacityRatio = currentIntensity / 100;
            lightDetector.style.opacity = opacityRatio;
            lightDetector.style.boxShadow = `0 0 ${40 * opacityRatio}px rgba(252, 196, 25, ${opacityRatio})`;

            // Atualização do gráfico: Altera as coordenadas do 'Ponto Atual' (Dataset index 1)
            malusChart.data.datasets[1].data = [{ x: thetaDeg, y: currentIntensity }];
            malusChart.update('none'); // Atualização com otimização de performance (sem animação pesada)
        }

        // Vincula a função ao gatilho de arrastar o controle deslizante
        slider.addEventListener('input', updateSimulation);

        // Execução inicial para renderização padrão
        updateSimulation();
    </script>

</body>

</html>
